<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 500 500">
  <rect width="500" height="500" rx="80" fill="#0A0A0A"/>

  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF2200"/>
      <stop offset="100%" stop-color="#CC1A00"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Signal rings -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="#FF2200" stroke-width="1.5" opacity="0.09"/>
  <circle cx="250" cy="250" r="180" fill="none" stroke="#FF2200" stroke-width="1.5" opacity="0.12"/>
  <circle cx="250" cy="250" r="140" fill="none" stroke="#FF2200" stroke-width="2" opacity="0.15"/>

  <!-- Signal arcs top-right -->
  <path d="M 250 250 m 0 -220 a 220 220 0 0 1 155.6 64.4" fill="none" stroke="#FF2200" stroke-width="2" opacity="0.14" stroke-linecap="round"/>
  <path d="M 250 250 m 0 -180 a 180 180 0 0 1 127.3 52.7" fill="none" stroke="#FF2200" stroke-width="2" opacity="0.18" stroke-linecap="round"/>
  <path d="M 250 250 m 0 -140 a 140 140 0 0 1 99 41" fill="none" stroke="#FF2200" stroke-width="2.5" opacity="0.22" stroke-linecap="round"/>

  <!-- Signal arcs bottom-left -->
  <path d="M 250 250 m 0 220 a 220 220 0 0 1 -155.6 -64.4" fill="none" stroke="#FF2200" stroke-width="2" opacity="0.14" stroke-linecap="round"/>
  <path d="M 250 250 m 0 180 a 180 180 0 0 1 -127.3 -52.7" fill="none" stroke="#FF2200" stroke-width="2" opacity="0.18" stroke-linecap="round"/>
  <path d="M 250 250 m 0 140 a 140 140 0 0 1 -99 -41" fill="none" stroke="#FF2200" stroke-width="2.5" opacity="0.22" stroke-linecap="round"/>

  <!-- Waveform bars — phone handset silhouette, centered -->
  <g filter="url(#gl)" transform="translate(120, 150)">
    <!-- Left earpiece (tall) -->
    <rect x="10" y="42" width="5" height="116" rx="2.5" fill="url(#g)" opacity="0.5"/>
    <rect x="19" y="28" width="5" height="144" rx="2.5" fill="url(#g)" opacity="0.6"/>
    <rect x="28" y="18" width="6" height="164" rx="3" fill="url(#g)" opacity="0.75"/>
    <rect x="38" y="12" width="6" height="176" rx="3" fill="url(#g)" opacity="0.85"/>
    <rect x="48" y="8" width="6" height="184" rx="3" fill="url(#g)" opacity="0.95"/>
    <rect x="58" y="14" width="6" height="172" rx="3" fill="url(#g)" opacity="0.9"/>
    <rect x="68" y="22" width="6" height="156" rx="3" fill="url(#g)" opacity="0.8"/>

    <!-- Neck dip (short) -->
    <rect x="78" y="58" width="5" height="84" rx="2.5" fill="url(#g)" opacity="0.55"/>
    <rect x="87" y="68" width="5" height="64" rx="2.5" fill="url(#g)" opacity="0.45"/>
    <rect x="96" y="74" width="5" height="52" rx="2.5" fill="url(#g)" opacity="0.38"/>
    <rect x="105" y="78" width="5" height="44" rx="2.5" fill="url(#g)" opacity="0.32"/>
    <rect x="114" y="80" width="5" height="40" rx="2.5" fill="url(#g)" opacity="0.30"/>
    <rect x="123" y="82" width="5" height="36" rx="2.5" fill="url(#g)" opacity="0.28"/>
    <rect x="132" y="80" width="5" height="40" rx="2.5" fill="url(#g)" opacity="0.30"/>
    <rect x="141" y="78" width="5" height="44" rx="2.5" fill="url(#g)" opacity="0.32"/>
    <rect x="150" y="75" width="5" height="50" rx="2.5" fill="url(#g)" opacity="0.35"/>
    <rect x="159" y="72" width="5" height="56" rx="2.5" fill="url(#g)" opacity="0.40"/>

    <!-- Right mouthpiece (tall) -->
    <rect x="168" y="60" width="5" height="80" rx="2.5" fill="url(#g)" opacity="0.50"/>
    <rect x="177" y="42" width="6" height="116" rx="3" fill="url(#g)" opacity="0.65"/>
    <rect x="187" y="30" width="6" height="140" rx="3" fill="url(#g)" opacity="0.75"/>
    <rect x="197" y="20" width="6" height="160" rx="3" fill="url(#g)" opacity="0.85"/>
    <rect x="207" y="10" width="6" height="180" rx="3" fill="url(#g)" opacity="0.95"/>
    <rect x="217" y="6" width="6" height="188" rx="3" fill="url(#g)" opacity="1"/>
    <rect x="227" y="10" width="6" height="180" rx="3" fill="url(#g)" opacity="0.95"/>
    <rect x="237" y="18" width="6" height="164" rx="3" fill="url(#g)" opacity="0.85"/>
    <rect x="247" y="36" width="5" height="128" rx="2.5" fill="url(#g)" opacity="0.65"/>
  </g>
</svg>
